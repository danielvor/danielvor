name: Deploy Go Portfolio to Cloud Run

on:
  push:
    branches:
      - main # O workflow será acionado toda vez que houver um push para a branch 'main'

env:
  # Definir variáveis de ambiente para o workflow
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Pega o ID do projeto do secret
  SERVICE_NAME: meu-portfolio-go # Nome que seu serviço Cloud Run terá (ex: meu-portfolio-go)
  REGION: us-central1 # A região onde você quer implantar seu serviço Cloud Run

jobs:
  deploy:
    runs-on: ubuntu-latest # O runner que executará os passos do workflow

    # Permissões necessárias para o Google Cloud Actions
    permissions:
      contents: 'read' # Necessário para fazer o checkout do código
      id-token: 'write' # Necessário para autenticação OIDC (se usar Workload Identity Federation), mas aqui funciona com a chave SA

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Faz o checkout do seu código do GitHub

      - name: Set up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Define a versão do Go que será usada (ajuste conforme a sua)

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Usa a chave JSON da Service Account armazenada como secret
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }} # Define o projeto padrão para os comandos gcloud

      - name: Configure Docker for Google Container Registry
        run: |
          gcloud auth configure-docker # Configura o Docker para autenticar no GCR/Artifact Registry

      - name: Build Docker Image
        run: |
          # Constrói a imagem Docker a partir do seu Dockerfile
          # O nome da imagem é 'gcr.io/PROJECT_ID/SERVICE_NAME'
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} .

      - name: Push Docker Image to Google Container Registry
        run: |
          # Envia a imagem Docker para o Google Container Registry
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }} # O nome do seu serviço Cloud Run
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }} # A imagem que será implantada
          region: ${{ env.REGION }} # A região do seu serviço
          # Permitee que seu serviço seja acessível publicamente sem autenticação
          allow_unauthenticated: true

      - name: Show Deployed Service URL
        run: echo "Service URL: ${{ steps.deploy.outputs.url }}"